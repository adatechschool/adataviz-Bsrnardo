<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <title>Inventaire des collections : Musée d'Arts de Nantes</title>
  </head>
  <body>
    <header class="barre">
      <img src="/logo.svg" alt="Musee d'Arts de Nantes Logo" class="logo" />
    </header>

    <header class="hero">
      <h1 class="entete">Inventaire des collections</h1>
    </header>

    <nav class="filtres">
      
      <label for="filtre-domaine" class="sr-only">Domaine</label>
      <select id="filtre-domaine" name="domaine">
        <option value="">Domaines</option>
      </select>
      
      <label for="filtre-technique" class="sr-only">Technique</label>
      <select id="filtre-technique" name="technique">
        <option value="">Techniques</option>
      </select>

      <label for="filtre-periode" class="sr-only">Période</label>
      <select id="filtre-periode" name="periode">
        <option value="">Période</option>
      </select>
    </nav>

    <main>
      <div class="cards"></div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
